name: Update reject rules

on:
  schedule:
    # 每日 02:00 UTC (Hong Kong 10:00)
    - cron: "0 2 * * *"
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write      # 允許 GITHUB_TOKEN push

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone 夠用

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install aiohttp pyyaml

      - name: Run merger
        run: python merge.py

      - name: Commit & push (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # 只有檔案真的有改變先 commit
          if git diff --cached --quiet; then
            echo "No changes – skipping commit"
          else
            RULES=$(grep -c '^[^#]' output/reject.list || true)
            git commit -m "chore: update reject rules (${RULES} rules) [$(date -u +%Y-%m-%d)]"
            git push
          fi
